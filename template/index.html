<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Loading...</title>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; height: -webkit-fill-available; }
body { height: 100%; min-height: -webkit-fill-available; overflow-x: hidden; font-family: 'DM Sans', sans-serif; background: #0d1f2d; color: #fff; }

.wrap {
  height: 100vh; height: 100svh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2rem 1.8rem;
  text-align: center;
  max-width: 390px;
  margin: 0 auto;
  position: relative;
  overflow-x: hidden;
}
.wrap::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 80% 20%, rgba(58,184,204,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 50% at 10% 80%, rgba(26,74,82,0.12) 0%, transparent 60%);
  pointer-events: none;
}

.step { display:none; width:100%; flex-direction:column; align-items:center; justify-content:flex-start; position:relative; z-index:1; height:100vh; height:100svh; padding:2rem 1.8rem; }
.step.on { display:flex; }
.step.slide-in { animation: slideIn .35s cubic-bezier(.22,1,.36,1); }
.step.slide-back { animation: slideBack .35s cubic-bezier(.22,1,.36,1); }
@keyframes slideIn { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
@keyframes slideBack { from{opacity:0;transform:translateX(-40px)} to{opacity:1;transform:translateX(0)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

#step-intro { justify-content:center; }
#step-loader { justify-content:center; }
#step-thinking { justify-content:center; }
#step-result { justify-content:flex-start; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-top:1.5rem; padding-bottom:2rem; }

.q-body { display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; flex:1; padding-bottom:5rem; }
.q-footer { position:absolute; bottom:2rem; left:1.8rem; right:1.8rem; display:flex; flex-direction:column; align-items:center; gap:.4rem; }

/* LOADER */
.loader-ring-wrap { position:relative; width:100px; height:100px; margin-bottom:2rem; }
.loader-ring { position:absolute; inset:0; border-radius:50%; border:2px solid transparent; border-top-color:#3ab8cc; animation:spinRing 1s linear infinite; }
.loader-ring2 { position:absolute; inset:12px; border-radius:50%; border:2px solid transparent; border-bottom-color:#a8e6ef; animation:spinRing 1.5s linear infinite reverse; }
.loader-ring3 { position:absolute; inset:24px; border-radius:50%; border:2px solid transparent; border-left-color:#f5c842; animation:spinRing 2s linear infinite; }
.loader-center { position:absolute; inset:36px; border-radius:50%; background:rgba(58,184,204,0.1); display:flex; align-items:center; justify-content:center; font-size:18px; }
@keyframes spinRing { to{transform:rotate(360deg)} }
.loader-icons { display:flex; gap:1.2rem; font-size:28px; margin-bottom:1.5rem; }
.li{animation:floatOnce .8s ease forwards;opacity:0}
.li1{animation-delay:.1s}.li2{animation-delay:.3s}.li3{animation-delay:.5s}.li4{animation-delay:.7s}
@keyframes floatOnce{0%{opacity:0;transform:translateY(20px) scale(.5)}60%{opacity:1;transform:translateY(-6px) scale(1.15)}100%{opacity:1;transform:translateY(0) scale(1)}}
.loader-name { font-family:'DM Serif Display',serif; font-size:26px; color:#a8e6ef; margin-bottom:.4rem; animation:glowPulse 2s ease-in-out infinite; }
@keyframes glowPulse{0%,100%{text-shadow:0 0 10px rgba(168,230,239,.3)}50%{text-shadow:0 0 25px rgba(168,230,239,.8),0 0 50px rgba(58,184,204,.3)}}
.loader-sub { font-size:12px; color:rgba(255,255,255,.4); margin-bottom:2rem; letter-spacing:1px; }
.loader-bar-bg { width:160px; height:3px; background:rgba(255,255,255,.1); border-radius:2px; overflow:hidden; }
.loader-bar-fill { height:100%; width:0; background:linear-gradient(to right,#3ab8cc,#a8e6ef,#f5c842); border-radius:2px; animation:lb 2.7s ease forwards .2s; }
@keyframes lb{0%{width:0}60%{width:70%}80%{width:85%}100%{width:100%}}

/* INTRO */
.big-title { font-family:'DM Serif Display',serif; font-size:30px; line-height:1.25; margin-bottom:1.2rem; animation:fadeUp .5s ease forwards .15s; opacity:0; }
.big-title em { color:#3ab8cc; font-style:italic; }
.time-badge { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:#3ab8cc; background:rgba(58,184,204,.15); border:1px solid rgba(58,184,204,.3); border-radius:100px; padding:5px 14px; margin-bottom:2rem; animation:fadeUp .5s ease forwards .3s; opacity:0; }
.btn-go {
  width:100%; max-width:300px; font-size:16px; font-weight:700;
  color:#0d1f2d; background:linear-gradient(135deg,#3ab8cc,#a8e6ef);
  border:none; border-radius:16px; padding:17px; cursor:pointer;
  font-family:'DM Sans',sans-serif; transition:transform .2s;
  animation:fadeUp .5s ease forwards .45s, breathe 3s ease-in-out infinite 1.5s;
  opacity:0;
}
@keyframes breathe {
  0%,100%{box-shadow:0 8px 32px rgba(58,184,204,.4),0 0 0 0 rgba(58,184,204,.3);transform:scale(1)}
  50%{box-shadow:0 8px 32px rgba(58,184,204,.5),0 0 0 14px rgba(58,184,204,.0);transform:scale(1.02)}
}
.btn-go:active{transform:scale(.97)!important}

/* SWEEP ANIMATION */
.sweep-wrap { position:relative; height:40px; width:100%; overflow:hidden; margin-bottom:1.6rem; }
.sweep-line {
  position:absolute; top:50%; left:-100%;
  width:100%; height:1.5px;
  background:linear-gradient(to right,transparent,#3ab8cc,#a8e6ef,transparent);
  animation:sweepAcross 1.2s ease-in-out forwards;
}
@keyframes sweepAcross {
  0%{left:-100%;opacity:0} 20%{opacity:1} 80%{opacity:1} 100%{left:100%;opacity:0}
}

/* PROGRESS */
.prog { display:flex; gap:8px; margin-bottom:1.8rem; }
.pd { height:5px; width:28px; border-radius:3px; background:rgba(255,255,255,.1); transition:all .4s cubic-bezier(.34,1.56,.64,1); }
.pd.act { background:#3ab8cc; box-shadow:0 0 10px #3ab8cc; width:44px; }
.pd.done { background:rgba(58,184,204,.4); }
.pd.picked { background:#a8e6ef; box-shadow:0 0 12px #a8e6ef; }

/* QUESTION */
.q-emoji { font-size:42px; margin-bottom:1rem; }
.q-title { font-family:'DM Serif Display',serif; font-size:22px; line-height:1.35; margin-bottom:1.5rem; max-width:300px; }

/* single-select options */
.opts { width:100%; max-width:340px; display:flex; flex-direction:column; gap:.65rem; margin-bottom:1.2rem; }
.opt {
  padding:1rem 1.2rem; border:1.5px solid rgba(255,255,255,.12); border-radius:14px;
  font-size:14px; color:#fff; cursor:pointer; background:rgba(255,255,255,.05);
  font-family:'DM Sans',sans-serif; transition:all .2s; text-align:center; line-height:1.4;
  position:relative; overflow:hidden;
}
.opt:hover{border-color:#3ab8cc;background:rgba(58,184,204,.12);transform:translateY(-1px)}
.opt.sel{border-color:#3ab8cc;background:rgba(58,184,204,.2);color:#a8e6ef;font-weight:600;box-shadow:0 0 20px rgba(58,184,204,.25);}

/* multi-select grid */
.multi-grid { width:100%; max-width:340px; display:grid; grid-template-columns:1fr 1fr; gap:.6rem; margin-bottom:1.2rem; }
.mopt {
  padding:.9rem .8rem; border:1.5px solid rgba(255,255,255,.12); border-radius:14px;
  font-size:13px; color:rgba(255,255,255,.7); cursor:pointer; background:rgba(255,255,255,.04);
  font-family:'DM Sans',sans-serif; transition:all .2s; text-align:center; line-height:1.4;
  position:relative; overflow:hidden;
  min-height:64px; display:flex; align-items:center; justify-content:center;
}
.mopt:hover{border-color:#3ab8cc;background:rgba(58,184,204,.1)}
.mopt.sel{border-color:#3ab8cc;background:rgba(58,184,204,.2);color:#a8e6ef;font-weight:600;box-shadow:0 0 16px rgba(58,184,204,.2);}
.mopt .check { display:none; position:absolute; top:6px; right:8px; font-size:11px; color:#3ab8cc; }
.mopt.sel .check { display:block; }

.btn-next { font-size:14px; font-weight:600; color:#0d1f2d; background:#3ab8cc; border:none; border-radius:12px; padding:12px 32px; cursor:pointer; box-shadow:0 6px 20px rgba(58,184,204,.3); font-family:'DM Sans',sans-serif; transition:all .2s; margin-bottom:.5rem; }
.btn-next:disabled{opacity:.3;cursor:default;box-shadow:none}
.btn-next:not(:disabled):hover{background:#a8e6ef;transform:translateY(-1px)}
.btn-next:not(:disabled):active{transform:scale(.97)}
.btn-back { font-size:13px; color:rgba(255,255,255,.3); background:none; border:none; cursor:pointer; padding:6px 12px; font-family:'DM Sans',sans-serif; transition:color .2s; }
.btn-back:hover{color:#3ab8cc}

/* THINKING */
.think-phase1,.think-phase2{width:100%;display:flex;flex-direction:column;align-items:center}
.think-phase2{display:none}
.think-dots-wrap{display:flex;gap:12px;margin-bottom:1.5rem}
.td{width:12px;height:12px;border-radius:50%;animation:tp 1.2s ease-in-out infinite}
.td1{background:#3ab8cc;animation-delay:0s}.td2{background:#f5c842;animation-delay:.15s}.td3{background:#f06292;animation-delay:.3s}.td4{background:#81c784;animation-delay:.45s}
@keyframes tp{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.7);opacity:1}}
.think-lbl{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;margin-top:.8rem}
.circle-wrap{position:relative;width:160px;height:160px}
.circle-wrap svg{transform:rotate(-90deg)}
.circle-bg{fill:none;stroke:rgba(255,255,255,.08);stroke-width:6}
.circle-fill{fill:none;stroke:#3ab8cc;stroke-width:6;stroke-linecap:round;stroke-dasharray:440;stroke-dashoffset:440}
.circle-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.think-counter{font-family:'DM Serif Display',serif;font-size:52px;line-height:1;display:inline;background:linear-gradient(135deg,#3ab8cc,#a8e6ef);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.think-pct{font-family:'DM Serif Display',serif;font-size:28px;font-weight:400;color:#a8e6ef;display:inline;vertical-align:super;line-height:1}
.think-match-lbl{font-size:11px;color:rgba(255,255,255,.35);letter-spacing:2px;text-transform:uppercase;margin-top:.5rem}

/* RESULT */
.close-btn{position:absolute;top:1rem;right:1rem;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:10}
.close-btn:hover{background:rgba(255,255,255,.15);color:#fff}
.res-score-wrap{margin-bottom:.4rem;animation:popIn .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.res-score{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:#3ab8cc;letter-spacing:2px;text-transform:uppercase}
.res-perfect{font-size:15px;color:rgba(255,255,255,.6);margin-bottom:.2rem;animation:fadeUp .4s ease forwards .05s;opacity:0}
.res-photo { margin:.6rem 0; animation:popIn .5s cubic-bezier(.34,1.56,.64,1) forwards .1s; opacity:0; }
.res-photo-placeholder {
  width:72px; height:72px; border-radius:50%;
  background:linear-gradient(135deg,#3ab8cc,#1a4a52);
  display:flex; align-items:center; justify-content:center;
  font-family:'DM Serif Display',serif; font-size:22px; color:#fff;
  border:2px solid #3ab8cc; box-shadow:0 0 20px rgba(58,184,204,.3);
  margin:0 auto;
}
.res-photo img { width:120px; height:120px; border-radius:50%; object-fit:cover; object-position:center center; border:2.5px solid #3ab8cc; box-shadow:0 0 24px rgba(58,184,204,.35); }
.p-name-big{font-family:'DM Serif Display',serif;font-size:44px;margin-bottom:.4rem;animation:fadeUp .5s ease forwards .1s, shimmerName 3s ease-in-out infinite 1s;opacity:0;background:linear-gradient(90deg,#fff 0%,#fff 40%,#a8e6ef 50%,#3ab8cc 60%,#fff 70%,#fff 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
@keyframes shimmerName{0%{background-position:200% center}100%{background-position:-200% center}}
.p-role-big{font-size:13px;color:rgba(255,255,255,.5);line-height:1.6;animation:fadeUp .5s ease forwards .2s;opacity:0}
.cbtns{display:flex;flex-direction:column;gap:.6rem;width:100%;max-width:340px;margin-top:1.5rem}
.cb{display:flex;align-items:center;justify-content:center;gap:.7rem;font-size:15px;font-weight:600;border-radius:14px;padding:15px;text-decoration:none;font-family:'DM Sans',sans-serif;transition:all .2s;border:none;cursor:pointer}
.cb-li{color:#fff;background:#0077b5;animation:fadeUp .5s ease forwards .2s, pulseBtn 2.5s ease-in-out infinite 2s;opacity:0;box-shadow:0 6px 20px rgba(0,119,181,.3)}
.cb-li:hover{background:#0090d9;transform:translateY(-1px)}
.cb-wa{color:#fff;background:#25d366;animation:fadeUp .5s ease forwards .3s;opacity:0;box-shadow:0 6px 20px rgba(37,211,102,.3)}
.cb-wa:hover{background:#20c45a;transform:translateY(-1px)}
.cb-icon{width:20px;height:20px;flex-shrink:0}
@keyframes pulseBtn{0%,100%{box-shadow:0 6px 20px rgba(0,119,181,.3),0 0 0 0 rgba(0,119,181,.4)}50%{box-shadow:0 6px 20px rgba(0,119,181,.3),0 0 0 10px rgba(0,119,181,.0)}}

/* CONFETTI */
.cf{position:fixed;pointer-events:none;border-radius:2px;animation:cfFall linear forwards}
@keyframes cfFall{0%{opacity:1;transform:translateY(-10px) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

/* KEYFRAMES */
@keyframes rippleAnim{from{transform:scale(0);opacity:1}to{transform:scale(1);opacity:0}}
@keyframes hapticPick{0%{transform:scale(1)}20%{transform:scale(1.03) rotate(1deg)}40%{transform:scale(.98) rotate(-1deg)}60%{transform:scale(1.01)}100%{transform:scale(1) rotate(0)}}
@keyframes particleShoot{0%{transform:translate(-50%,-50%) translate(0,0);opacity:1}100%{transform:translate(-50%,-50%) translate(var(--tx),var(--ty));opacity:0}}
</style>
</head>
<body>
<div class="wrap">

  <!-- LOADER -->
  <div class="step on" id="step-loader">
    <div class="loader-ring-wrap">
      <div class="loader-ring"></div>
      <div class="loader-ring2"></div>
      <div class="loader-ring3"></div>
      <div class="loader-center">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3ab8cc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
    </div>
    <div class="loader-icons">
      <span class="li li1">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#3ab8cc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </span>
      <span class="li li2">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#a8e6ef" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      </span>
      <span class="li li3">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#f5c842" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>
      </span>
      <span class="li li4">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#81c784" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      </span>
    </div>
    <div class="loader-name" id="loaderName"></div>
    <div class="loader-sub">Finding your perfect match</div>
    <div class="loader-bar-bg"><div class="loader-bar-fill"></div></div>
  </div>

  <!-- INTRO -->
  <div class="step" id="step-intro">
    <div class="sweep-wrap">
      <div class="sweep-line"></div>
      <div class="sweep-line" style="animation-delay:.4s;opacity:.5"></div>
      <div class="sweep-line" style="animation-delay:.8s;opacity:.25"></div>
    </div>
    <h1 class="big-title" id="introTitle"></h1>
    <div class="time-badge" id="timeBadge"></div>
    <button class="btn-go" onclick="goForward('step-q0')">Let's find out →</button>
  </div>

  <!-- Questions are injected here by buildQuiz() -->

  <!-- THINKING -->
  <div class="step" id="step-thinking">
    <div class="think-phase1" id="phase1">
      <div class="think-dots-wrap">
        <div class="td td1"></div><div class="td td2"></div>
        <div class="td td3"></div><div class="td td4"></div>
      </div>
      <div class="think-lbl" id="thinkLabel"></div>
    </div>
    <div class="think-phase2" id="phase2">
      <div class="circle-wrap">
        <svg width="160" height="160" viewBox="0 0 160 160">
          <defs>
            <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" style="stop-color:#3ab8cc"/>
              <stop offset="100%" style="stop-color:#a8e6ef"/>
            </linearGradient>
          </defs>
          <circle class="circle-bg" cx="80" cy="80" r="70"/>
          <circle class="circle-fill" id="circleFill" cx="80" cy="80" r="70"/>
        </svg>
        <div class="circle-center">
          <div><span class="think-counter" id="counterNum">0</span><span class="think-pct">%</span></div>
        </div>
      </div>
      <div class="think-match-lbl">compatibility match</div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="step" id="step-result">
    <button class="close-btn" onclick="goForward('step-intro')">✕</button>
    <div class="res-score-wrap"><span class="res-score" id="resScore"></span></div>
    <div class="res-perfect">Perfect match ✨</div>
    <div style="height:.6rem"></div>
    <div class="res-photo" id="resPhoto"></div>
    <div class="p-name-big" id="resName"></div>
    <div class="p-role-big" id="resRole"></div>
    <div class="cbtns">
      <a id="liBtn" target="_blank" class="cb cb-li">
        <svg class="cb-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        View LinkedIn
      </a>
      <a id="waBtn" target="_blank" class="cb cb-wa">
        <svg class="cb-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
        WhatsApp
      </a>
    </div>
  </div>

</div>

<script>
(function(){ function s(){ document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px'); } s(); window.addEventListener('resize', s); })();

// ─── Boot: inject CONFIG values ────────────────────────────────────────────
(function boot() {
  const firstName = CONFIG.name.split(' ')[0];
  document.title = 'Could ' + CONFIG.name + ' be your perfect match?';
  document.getElementById('loaderName').textContent = CONFIG.name;
  document.getElementById('introTitle').innerHTML =
    'Could <em>' + firstName + '</em> be your<br><em>perfect match?</em>';
  const numQ = Math.min(CONFIG.questions.length, 7);
  document.getElementById('timeBadge').textContent =
    '⏱ 15 seconds · ' + numQ + ' question' + (numQ !== 1 ? 's' : '');
  document.getElementById('thinkLabel').textContent =
    'Checking your match with ' + firstName + '...';
  document.getElementById('resScore').textContent = CONFIG.matchScore + '%';
  document.getElementById('resName').textContent = CONFIG.name;
  document.getElementById('resRole').textContent = CONFIG.role;
  document.getElementById('liBtn').href = CONFIG.linkedin;
  document.getElementById('waBtn').href = CONFIG.whatsapp;

  const photoEl = document.getElementById('resPhoto');
  if (CONFIG.photo) {
    photoEl.innerHTML = '<img src="' + CONFIG.photo + '" alt="' + CONFIG.name + '">';
  } else {
    const initials = CONFIG.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    photoEl.innerHTML = '<div class="res-photo-placeholder">' + initials + '</div>';
  }
})();

// ─── Build question steps dynamically ──────────────────────────────────────
function buildQuiz() {
  const qs = CONFIG.questions.slice(0, 7);
  const numQ = qs.length;
  let insertAfter = document.getElementById('step-intro');

  qs.forEach((q, i) => {
    const isLast     = i === numQ - 1;
    const nextAction = isLast ? "showThinking()" : "goForward('step-q" + (i + 1) + "')";
    const backAction = i === 0 ? "goBackward('step-intro')" : "goBackward('step-q" + (i - 1) + "')";

    const dots = qs.map((_, d) => {
      const cls = d < i ? 'pd done' : d === i ? 'pd act' : 'pd';
      return '<div class="' + cls + '"></div>';
    }).join('');

    let optsHTML;
    if (q.type === 'multi') {
      optsHTML = '<div class="multi-grid">' +
        q.options.map(o =>
          '<button class="mopt" onclick="mpick(this,\'n' + i + '\')"><span class="check">✓</span>' + o + '</button>'
        ).join('') +
        '</div>';
    } else {
      optsHTML = '<div class="opts">' +
        q.options.map(o =>
          '<button class="opt" onclick="pick(this,\'n' + i + '\')">' + o + '</button>'
        ).join('') +
        '</div>';
    }

    const div = document.createElement('div');
    div.className = 'step';
    div.id = 'step-q' + i;
    div.innerHTML =
      '<div class="prog">' + dots + '</div>' +
      '<div class="q-body">' +
        (q.emoji ? '<div class="q-emoji">' + q.emoji + '</div>' : '') +
        '<div class="q-title">' + q.question + '</div>' +
        optsHTML +
      '</div>' +
      '<div class="q-footer">' +
        '<button class="btn-next" id="n' + i + '" disabled onclick="' + nextAction + '">' +
          (isLast ? 'See result →' : 'Next →') +
        '</button>' +
        '<button class="btn-back" onclick="' + backAction + '">← Back</button>' +
      '</div>';

    insertAfter.insertAdjacentElement('afterend', div);
    insertAfter = div;
  });
}
buildQuiz();

// ─── Navigation ────────────────────────────────────────────────────────────
function goForward(id) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('on','slide-in','slide-back'));
  document.getElementById(id).classList.add('on','slide-in');
}
function goBackward(id) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('on','slide-in','slide-back'));
  document.getElementById(id).classList.add('on','slide-back');
}

// ─── Interactions ──────────────────────────────────────────────────────────
document.addEventListener('click', e => {
  const opt = e.target.closest('.opt, .mopt');
  if (!opt) return;
  const r = document.createElement('span');
  const rect = opt.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height) * 1.5;
  r.style.cssText =
    'position:absolute;width:' + size + 'px;height:' + size + 'px;' +
    'left:' + (e.clientX - rect.left - size / 2) + 'px;' +
    'top:' + (e.clientY - rect.top - size / 2) + 'px;' +
    'background:rgba(58,184,204,.3);border-radius:50%;pointer-events:none;' +
    'animation:rippleAnim .5s ease-out forwards;';
  opt.appendChild(r);
  setTimeout(() => r.remove(), 600);
});

function pick(el, btnId) {
  el.closest('.opts').querySelectorAll('.opt').forEach(o => o.classList.remove('sel'));
  el.classList.add('sel');
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'hapticPick .35s ease forwards';
  const dot = el.closest('.step') && el.closest('.step').querySelector('.pd.act');
  if (dot) dot.classList.add('picked');
  document.getElementById(btnId).disabled = false;
}

function mpick(el, btnId) {
  el.classList.toggle('sel');
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'hapticPick .35s ease forwards';
  const anySelected = el.closest('.multi-grid').querySelectorAll('.mopt.sel').length > 0;
  document.getElementById(btnId).disabled = !anySelected;
  if (anySelected) {
    const dot = el.closest('.step') && el.closest('.step').querySelector('.pd.act');
    if (dot) dot.classList.add('picked');
  }
}

// ─── Thinking / Result ────────────────────────────────────────────────────
function showThinking() {
  goForward('step-thinking');
  const target = CONFIG.matchScore || 97;
  const circumference = 2 * Math.PI * 70;

  setTimeout(() => {
    document.getElementById('phase1').style.display = 'none';
    const p2 = document.getElementById('phase2');
    p2.style.display = 'flex';
    p2.style.flexDirection = 'column';
    p2.style.alignItems = 'center';

    let n = 0;
    const el = document.getElementById('counterNum');
    const circle = document.getElementById('circleFill');
    const iv = setInterval(() => {
      const step = Math.max(2, Math.ceil((target - n) * 0.12));
      n = Math.min(target, n + step);
      el.textContent = n;
      const offset = circumference - (n / 100) * circumference;
      circle.style.strokeDashoffset = offset;
      circle.style.stroke = n > 80 ? 'url(#circleGrad)' : '#3ab8cc';
      if (n >= target) {
        clearInterval(iv);
        setTimeout(() => {
          particleExplosion();
          setTimeout(() => { goForward('step-result'); confetti(); }, 600);
        }, 600);
      }
    }, 55);
  }, 1200);
}

function particleExplosion() {
  const el = document.getElementById('counterNum');
  if (!el) return;
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const colors = ['#3ab8cc','#f5c842','#f06292','#81c784','#a8e6ef','#fff'];
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    const angle = (i / 30) * Math.PI * 2;
    const dist = 60 + Math.random() * 80;
    const size = 4 + Math.random() * 7;
    const color = colors[Math.floor(Math.random() * colors.length)];
    p.style.cssText =
      'position:fixed;left:' + cx + 'px;top:' + cy + 'px;width:' + size + 'px;height:' + size + 'px;' +
      'border-radius:50%;background:' + color + ';pointer-events:none;z-index:999;' +
      'transform:translate(-50%,-50%);animation:particleShoot .7s ease-out forwards;' +
      '--tx:' + (Math.cos(angle) * dist) + 'px;--ty:' + (Math.sin(angle) * dist) + 'px;' +
      'box-shadow:0 0 6px ' + color + ';';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 900);
  }
}

function confetti() {
  const colors = ['#3ab8cc','#f5c842','#f06292','#81c784','#a8e6ef','#ffffff'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'cf';
      const s = 5 + Math.random() * 9;
      el.style.cssText =
        'left:' + (Math.random() * 100) + 'vw;top:-10px;width:' + s + 'px;height:' + s + 'px;' +
        'background:' + colors[Math.floor(Math.random() * colors.length)] + ';' +
        'animation-duration:' + (1.8 + Math.random() * 2) + 's;' +
        'animation-delay:' + (Math.random() * 0.6) + 's;';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4500);
    }, i * 20);
  }
}

setTimeout(() => goForward('step-intro'), 2000);
</script>
</body>
</html>
